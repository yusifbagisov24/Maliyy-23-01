<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku Ultra - Battle Royale</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="bg-animate"></div>
    <div class="main-wrapper">
        <div id="auth-screen" class="glass-card active">
            <div class="logo-area"><h1>Aytac<span> I LOVE YOU</span></h1></div>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Ləqəbiniz">
                <input type="text" id="roomInput" placeholder="Otaq Kodu">
            </div>
            <div class="difficulty-selector">
                <div class="levels">
                    <button class="lvl-btn active" data-lvl="easy">Asan</button>
                    <button class="lvl-btn" data-lvl="medium">Orta</button>
                    <button class="lvl-btn" data-lvl="hard">Çətin</button>
                </div>
            </div>
            <button onclick="joinBattle()" class="start-btn">DÖYÜŞƏ BAŞLA</button>
        </div>

        <div id="game-screen" class="glass-card">
            <div id="leaderboard">
                <div class="player p1"><span id="p1-name">---</span><span class="score" id="p1-score">0</span></div>
                <div class="vs-circle">VS</div>
                <div class="player p2"><span id="p2-name">---</span><span class="score" id="p2-score">0</span></div>
            </div>
            <div class="game-info">
                <span>🕒 <span id="timer">00:00</span></span>
                <div class="actions">
                    <button onclick="useHint()" class="action-btn hint">💡 Kömək (50)</button>
                    <button onclick="useFreeze()" class="action-btn freeze">❄️ Dondur (150)</button>
                </div>
                <span class="danger">⚠️ <span id="errors-count">0</span></span>
            </div>
            
            <div id="board-container" style="position: relative;">
                <div id="board" class="sudoku-grid"></div>
                <div id="combo-alert" class="combo-text"></div>
                <div id="freeze-overlay" class="freeze-screen">BUZLANDIN! ❄️</div>
            </div>
            
            <button onclick="checkWin()" class="finish-btn">BİTİRDİM!</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAfwdhxb9n94LJF0b99axhTEvV3siOOiFQ",
            authDomain: "sudoku-online-2c6f4.firebaseapp.com",
            projectId: "sudoku-online-2c6f4",
            storageBucket: "sudoku-online-2c6f4.firebasestorage.app",
            messagingSenderId: "151115724666",
            appId: "1:151115724666:web:f56c198c6b88397b4c08c3",
            databaseURL: "https://sudoku-online-2c6f4-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
    <script src="script.js"></script>
</body>
</html>
