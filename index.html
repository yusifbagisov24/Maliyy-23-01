<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku Battle Online</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="main-container">
        <div id="auth-screen" class="screen active">
            <h1 class="logo">SUDOKU <span>BATTLE</span></h1>
            <input type="text" id="usernameInput" placeholder="Ləqəb">
            <input type="text" id="roomInput" placeholder="Otaq Kodu">
            <div class="lvl-select">
                <button class="lvl-btn active" data-lvl="easy">Asan</button>
                <button class="lvl-btn" data-lvl="medium">Orta</button>
                <button class="lvl-btn" data-lvl="hard">Çətin</button>
            </div>
            <button onclick="joinBattle()" class="btn-main">BAŞLA</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="players-bar">
                <div class="p-info"><span id="p1-name">P1</span>: <span id="p1-score">0</span></div>
                <div class="vs">VS</div>
                <div class="p-info"><span id="p2-name">P2</span>: <span id="p2-score">0</span></div>
            </div>
            
            <div class="status-bar">
                <span>🕒 <id id="timer">00:00</id></span>
                <div class="powerups">
                    <button onclick="useHint()" class="pwr-btn">💡 Hint (50)</button>
                    <button onclick="useFreeze()" class="pwr-btn">❄️ Freeze (150)</button>
                </div>
                <span class="err">⚠️ <span id="errors-count">0</span></span>
            </div>

            <div class="board-wrapper">
                <div id="board" class="grid"></div>
                <div id="freeze-overlay" class="freeze-layer">DONMUSAN! ❄️</div>
                <div id="combo-popup" class="combo-msg"></div>
            </div>

            <button onclick="checkWin()" class="btn-finish">BİTİRDİM!</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAfwdhxb9n94LJF0b99axhTEvV3siOOiFQ",
            authDomain: "sudoku-online-2c6f4.firebaseapp.com",
            projectId: "sudoku-online-2c6f4",
            storageBucket: "sudoku-online-2c6f4.firebasestorage.app",
            messagingSenderId: "151115724666",
            appId: "1:151115724666:web:f56c198c6b88397b4c08c3",
            databaseURL: "https://sudoku-online-2c6f4-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
    <script src="script.js"></script>
</body>
</html>
