<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Online Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🧩 Sudoku Online</h1>
    
    <div id="online-panel">
        <input type="text" id="roomInput" placeholder="Otaq adı (məs: test1)">
        <button onclick="joinRoom()">Otağa Qoşul</button>
    </div>

    <div class="status-bar">
        <h3 id="timer">Vaxt: 0 s</h3>
        <h3 id="score-display">Xal: 0</h3>
    </div>

    <div id="board"></div>

    <div class="buttons">
        <button onclick="restartGame()">Yeni Oyun</button>
        <button onclick="checkWin()">Yoxla</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAfwdhxb9n94LJF0b99axhTEvV3siOOiFQ",
            authDomain: "sudoku-online-2c6f4.firebaseapp.com",
            projectId: "sudoku-online-2c6f4",
            storageBucket: "sudoku-online-2c6f4.firebasestorage.app",
            messagingSenderId: "151115724666",
            appId: "1:151115724666:web:f56c198c6b88397b4c08c3",
            measurementId: "G-PD3ZQQY98W",
            databaseURL: "https://sudoku-online-2c6f4-default-rtdb.europe-west1.firebasedatabase.app"
        };

        // Firebase-i başlat
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Qoşulma yoxlaması (Console-da görünəcək)
        db.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                console.log("✅ Firebase-ə uğurla qoşulduq!");
            } else {
                console.log("❌ Qoşulma kəsildi...");
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
